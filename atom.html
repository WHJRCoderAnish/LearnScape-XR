<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnScape XR - Atom</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; overflow: hidden; background: #000; }
        a-scene { width: 100%; height: 100vh; }

        .header { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 20px; z-index: 50; }
        .header h1 { color: white; font-size: 32px; flex: 1; text-align: center; }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .back-btn:hover { background: #764ba2; }

        .main-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #ffd700;
            color: #333;
            z-index: 50;
            transition: all 0.3s ease;
        }

        .main-btn:hover { background: #ffb300; transform: scale(1.05); }

        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(100, 200, 255, 0.3);
            color: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 50;
        }

        .sound-toggle:hover { background: rgba(100, 200, 255, 0.5); }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html';">← Back to Hub</button>
        <h1>⚛️ ATOM WORLD</h1>
        <div style="width: 100px;"></div>
    </div>

    <a-scene background="color: #c8e6c9">
        <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>

        <!-- VR Controllers -->
        <a-entity laser-controls="hand: left" raycaster="objects: .interactable" line="color: #FF0000"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .interactable" line="color: #00FF00"></a-entity>

        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" intensity="0.8" position="10 15 10"></a-light>

        <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#a5d6a7"></a-plane>

        <!-- Nucleus with Protons and Neutrons -->
        <a-entity id="nucleus" class="interactable" position="0 2 -8">
            <a-sphere id="nucleus-core" radius="0.55" color="#d32f2f"
                      animation="property: material.emissiveIntensity; to:1; dur:600; startEvents: energize"
                      animation__reverse="property: material.emissiveIntensity; to:0; dur:600; startEvents: energize">
            </a-sphere>

            <!-- Protons -->
            <a-sphere radius="0.15" position="-0.2 0.1 0.2" color="#ff5252"></a-sphere>
            <a-sphere radius="0.15" position="0.2 -0.1 0.1" color="#ff5252"></a-sphere>
            <a-sphere radius="0.15" position="0.1 0.2 -0.2" color="#ff5252"></a-sphere>
            <a-sphere radius="0.15" position="-0.15 -0.2 -0.15" color="#ff5252"></a-sphere>

            <!-- Neutrons -->
            <a-sphere radius="0.15" position="0.25 0.15 -0.1" color="#1e88e5"></a-sphere>
            <a-sphere radius="0.15" position="-0.25 0.1 0.15" color="#1e88e5"></a-sphere>
            <a-sphere radius="0.15" position="0 -0.25 0" color="#1e88e5"></a-sphere>
        </a-entity>

        <!-- Electron shells (K, L, M) -->
        <a-entity position="0 2 -8" animation="property: rotation; to:0 360 0; dur:2800; loop:true">
            <a-torus radius="1.0" radius-tubular="0.08" color="#64dd17" opacity="0.3"></a-torus>
            <a-sphere radius="0.18" position="1.0 0 0" color="#64dd17"></a-sphere>
        </a-entity>

        <a-entity position="0 2 -8" animation="property: rotation; to:0 -360 0; dur:3600; loop:true">
            <a-torus radius="1.5" radius-tubular="0.07" color="#00bcd4" opacity="0.2"></a-torus>
            <a-sphere radius="0.17" position="1.5 0 0" color="#00bcd4"></a-sphere>
            <a-sphere radius="0.17" position="-0.75 1.3 0" color="#00bcd4"></a-sphere>
        </a-entity>

        <a-entity position="0 2 -8" animation="property: rotation; to:0 360 0; dur:4800; loop:true">
            <a-torus radius="2.0" radius-tubular="0.06" color="#2196f3" opacity="0.15"></a-torus>
            <a-sphere radius="0.16" position="2.0 0 0" color="#2196f3"></a-sphere>
            <a-sphere radius="0.16" position="-1.0 1.73 0" color="#2196f3"></a-sphere>
            <a-sphere radius="0.16" position="-1.0 -1.73 0" color="#2196f3"></a-sphere>
        </a-entity>

        <!-- Nucleus glow -->
        <a-entity position="0 2 -8" animation="property: rotation; to:0 360 0; dur:4000; loop:true">
            <a-sphere radius="0.9" position="0 0 0" color="#ff5252" opacity="0.1"></a-sphere>
        </a-entity>

        <a-entity position="0 -1 -4">
            <a-text value="Use VR controllers to energize the nucleus!" align="center" scale="1.5 1.5 1.5" color="white"></a-text>
        </a-entity>
    </a-scene>

    <button class="main-btn" onclick="doEnergize();">⚛️ Energize the Atom</button>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 Sound ON</button>

    <script>
        let soundEnabled = true;
        let audioContext;

        function initAudio() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playEnergizeSound() {
            if (!soundEnabled || !audioContext) return;
            initAudio();
            const now = audioContext.currentTime;
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.
