<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart XR with VR Controllers</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #ffe0e0" vr-mode-ui="enabled: true" embedded>
    <!-- Camera + VR controls -->
    <a-entity id="cameraRig" position="0 1.6 5">
        <a-camera look-controls wasd-controls></a-camera>
        <!-- Left and right hand controllers -->
        <a-entity hand-controls="hand: left; handModelStyle: box"></a-entity>
        <a-entity hand-controls="hand: right; handModelStyle: box"></a-entity>
    </a-entity>

    <!-- Lighting -->
    <a-light type="ambient" intensity="0.6"></a-light>
    <a-light type="directional" intensity="0.8" position="5 10 5"></a-light>

    <!-- Floor -->
    <a-plane rotation="-90 0 0" width="50" height="50" color="#ffc0cb"></a-plane>

    <!-- Heart model -->
    <a-entity id="heart" position="0 2 -5">
        <a-sphere id="la" radius="0.45" position="-0.7 0.6 0" color="#ff4444"
                  animation="property: scale; to: 1.15 1.15 1.15; dur: 400; startEvents: pump"
                  animation__reverse="property: scale; to: 1 1 1; dur: 400; startEvents: pump">
        </a-sphere>

        <a-sphere id="ra" radius="0.42" position="0.7 0.6 0" color="#ff5555"
                  animation="property: scale; to: 1.15 1.15 1.15; dur: 400; startEvents: pump"
                  animation__reverse="property: scale; to: 1 1 1; dur: 400; startEvents: pump">
        </a-sphere>

        <a-sphere id="lv" radius="0.6" position="-0.5 -0.4 0" color="#d32f2f"
                  animation="property: scale; to: 1.25 1.25 1.25; dur: 500; startEvents: pump"
                  animation__reverse="property: scale; to: 1 1 1; dur: 500; startEvents: pump">
        </a-sphere>

        <a-sphere id="rv" radius="0.55" position="0.5 -0.4 0" color="#c62828"
                  animation="property: scale; to: 1.25 1.25 1.25; dur: 500; startEvents: pump"
                  animation__reverse="property: scale; to: 1 1 1; dur: 500; startEvents: pump">
        </a-sphere>

        <a-cone radius-bottom="0.35" radius-top="0" height="0.9" position="0 -1.3 0" color="#b71c1c"></a-cone>
        <a-box width="0.1" height="1.2" depth="0.5" position="0 0 0" color="#8b0000" opacity="0.6"></a-box>
        <a-cylinder radius="0.12" height="0.8" position="1.2 -0.2 0" rotation="0 0 75" color="#0066cc" opacity="0.7"></a-cylinder>
        <a-cylinder radius="0.1" height="0.5" position="1.1 0.8 0" rotation="0 0 65" color="#0066cc" opacity="0.7"></a-cylinder>
        <a-cylinder radius="0.15" height="0.8" position="-1.2 0.5 0" rotation="0 0 -65" color="#ff0000" opacity="0.8"></a-cylinder>
        <a-cylinder radius="0.12" height="0.6" position="1.1 0.3 0.3" rotation="0 0 60" color="#ff6666" opacity="0.8"></a-cylinder>
    </a-entity>

    <!-- Rotating glow around the heart -->
    <a-entity position="0 2 -5" animation="property: rotation; to: 0 360 0; dur: 5000; loop: true">
        <a-sphere radius="2.0" color="#ff1744" opacity="0.05"></a-sphere>
    </a-entity>
</a-scene>

<script>
    // Heartbeat on click or controller trigger
    const heart = document.getElementById('heart');

    // Play scale animation
    function pumpHeart() {
        heart.emit('pump');
    }

    // Listen for click (desktop) or VR controller triggers
    document.querySelector('a-scene').addEventListener('click', pumpHeart);

    document.querySelectorAll('[hand-controls]').forEach(controller => {
        controller.addEventListener('triggerdown', pumpHeart);
    });
</script>
</body>
</html>
