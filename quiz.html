<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnScape XR - Quiz</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; overflow: hidden;
background: #000; }
        a-scene { width: 100%; height: 100vh; }

        .header { position: fixed; top: 0; left: 0; right: 0; display:
flex; justify-content: space-between; align-items: center; padding:
20px; z-index: 50; }
        .header h1 { color: white; font-size: 32px; flex: 1;
text-align: center; }

        .back-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .back-btn:hover { background: #764ba2; }

        .main-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            z-index: 50;
            transition: all 0.3s ease;
        }

        .main-btn:hover { background: #2979f0; transform: scale(1.05); }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .overlay.show { display: flex; }

        .panel {
            background: rgba(20, 20, 40, 0.95);
            padding: 40px;
            border-radius: 20px;
            color: white;
            max-width: 700px;
            text-align: center;
        }

        .panel h2 { font-size: 32px; margin-bottom: 20px; color: #4a90e2; }
        .panel p { font-size: 18px; line-height: 1.8; margin-bottom:
25px; color: #e0e0e0; }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }

        .quiz-option {
            padding: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #4a90e2;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .quiz-option:hover {
            background: rgba(74, 144, 226, 0.2);
            transform: translateX(5px);
        }

        .quiz-option.correct {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4caf50;
            color: #4caf50;
        }

        .quiz-option.incorrect {
            background: rgba(244, 67, 54, 0.3);
            border-color: #f44336;
            color: #ff6b6b;
        }

        .feedback {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 2px solid #4caf50;
        }

        .feedback.incorrect {
            background: rgba(244, 67, 54, 0.2);
            color: #ff6b6b;
            border: 2px solid #f44336;
        }

        .close-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }

        .close-btn:hover { background: #764ba2; }

        .sound-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(100, 200, 255, 0.3);
            color: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 50;
        }

        .sound-toggle:hover { background: rgba(100, 200, 255, 0.5); }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn"
onclick="window.location.href='index.html';">← Back to Hub</button>
        <h1>❓ QUIZ WORLD</h1>
        <div style="width: 100px;"></div>
    </div>

    <a-scene background="color: #fff9c4">
        <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>
        <a-light type="ambient" intensity="0.7"></a-light>
        <a-light type="directional" intensity="0.8" position="10 15
10"></a-light>

        <a-plane position="0 0 0" rotation="-90 0 0" width="50"
height="50" color="#ffeb3b"></a-plane>

        <!-- Quiz Cube -->
        <a-entity position="0 2 -8" animation="property: rotation; to:
360 360 360; dur: 3000; loop: true">
            <a-box width="1" height="1" depth="1" color="#9c27b0"></a-box>
            <a-text value="?" position="0 0 0.51" scale="1.2 1.2 1.2"
color="white" align="center"></a-text>
        </a-entity>

        <a-entity position="0 -1 -4">
            <a-text value="Click the button below" align="center"
scale="1.5 1.5 1.5" color="white"></a-text>
        </a-entity>
    </a-scene>

    <button class="main-btn" onclick="startQuiz();">❓ Take Quiz</button>
    <button class="sound-toggle" id="soundToggle"
onclick="toggleSound()">🔊 Sound ON</button>

    <div class="overlay" id="overlay">
        <div class="panel">
            <h2>❓ Knowledge Check</h2>
            <p id="question"></p>
            <div class="quiz-options" id="options"></div>
            <div id="feedback" class="feedback"></div>
            <button class="close-btn" onclick="closeQuiz();"
id="closeBtn">Close Quiz</button>
        </div>
    </div>

    <script>
        let soundEnabled = true;
        let audioContext;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext ||
window.webkitAudioContext)();
            }
        }

        function playCorrectSound() {
            if (!soundEnabled || !audioContext) return;
            initAudio();

            const now = audioContext.currentTime;

            // Two ascending tones for correct answer
            const freqs = [400, 600];

            freqs.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                const startTime = now + (index * 0.1);
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0.2, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
                osc.start(startTime);
                osc.stop(startTime + 0.15);
            });
        }

        function playIncorrectSound() {
            if (!soundEnabled || !audioContext) return;
            initAudio();

            const now = audioContext.currentTime;

            // Two descending tones for incorrect answer
            const freqs = [500, 300];

            freqs.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                const startTime = now + (index * 0.1);
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0.2, startTime);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
                osc.start(startTime);
                osc.stop(startTime + 0.15);
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            btn.textContent = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
            btn.style.background = soundEnabled ? 'rgba(100, 200, 255,
0.3)' : 'rgba(255, 100, 100, 0.3)';
        }

        const quizzes = [
            {
                question: "What is the primary function of the heart?",
                options: [
                    { text: "A) Filter waste from blood", correct: false },
                    { text: "B) Pump blood throughout the body",
correct: true },
                    { text: "C) Produce oxygen", correct: false },
                    { text: "D) Store nutrients", correct: false }
                ],
                explanation: "Correct! The heart pumps oxygen-rich
blood throughout the body."
            },
            {
                question: "What orbits the nucleus in an atom?",
                options: [
                    { text: "A) Protons", correct: false },
                    { text: "B) Neutrons", correct: false },
                    { text: "C) Electrons", correct: true },
                    { text: "D) Ions", correct: false }
                ],
                explanation: "Correct! Electrons orbit around the
nucleus in orbitals."
            }
        ];

        let currentQuizIndex = 0;
        let answered = false;

        function startQuiz() {
            currentQuizIndex = 0;
            answered = false;
            showQuestion();
            document.getElementById('overlay').classList.add('show');
        }

        function showQuestion() {
            answered = false;
            const quiz = quizzes[currentQuizIndex];
            document.getElementById('question').textContent = quiz.question;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            quiz.options.forEach((option, index) => {
                const btn = document.createElement('div');
                btn.className = 'quiz-option';
                btn.textContent = option.text;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });

            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').textContent = '';
            document.getElementById('closeBtn').textContent = 'Close Quiz';
        }

        function checkAnswer(index) {
            if (answered) return;
            answered = true;

            const quiz = quizzes[currentQuizIndex];
            const options = document.querySelectorAll('.quiz-option');
            const feedback = document.getElementById('feedback');

            options.forEach(opt => opt.style.pointerEvents = 'none');

            if (quiz.options[index].correct) {
                options[index].classList.add('correct');
                feedback.textContent = '✓ ' + quiz.explanation;
                feedback.className = 'feedback show correct';
                playCorrectSound();
            } else {
                options[index].classList.add('incorrect');
                const correctIndex = quiz.options.findIndex(o => o.correct);
                options[correctIndex].classList.add('correct');
                feedback.textContent = '✗ Incorrect. Correct: ' +
quiz.options[correctIndex].text;
                feedback.className = 'feedback show incorrect';
                playIncorrectSound();
            }

            const btn = document.getElementById('closeBtn');
            if (currentQuizIndex < quizzes.length - 1) {
                btn.textContent = 'Next Question →';
                btn.onclick = () => {
                    currentQuizIndex++;
                    showQuestion();
                };
            } else {
                btn.textContent = 'Quiz Complete!';
                btn.onclick = () => closeQuiz();
            }
        }

        function closeQuiz() {
            document.getElementById('overlay').classList.remove('show');
        }

        // Initialize audio on first interaction
        document.addEventListener('click', () => {
            if (!audioContext) initAudio();
        }, { once: true });
    </script>
</body>
</html>
