<a-scene background="color: #fff9c4">
    <!-- Camera rig with VR controllers -->
    <a-entity id="cameraRig" position="0 1.6 0">
        <a-camera look-controls wasd-controls></a-camera>

        <!-- Left & right hand controllers -->
        <a-entity id="leftHand" hand-controls="hand: left; handModelStyle: box" 
                  raycaster="objects: .quiz-option" line="color: cyan"></a-entity>
        <a-entity id="rightHand" hand-controls="hand: right; handModelStyle: box" 
                  raycaster="objects: .quiz-option" line="color: cyan"></a-entity>
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" intensity="0.8" position="10 15 10"></a-light>

    <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#ffeb3b"></a-plane>

    <!-- Quiz cube -->
    <a-entity position="0 2 -8" animation="property: rotation; to: 360 360 360; dur: 3000; loop: true">
        <a-box width="1" height="1" depth="1" color="#9c27b0"></a-box>
        <a-text value="?" position="0 0 0.51" scale="1.2 1.2 1.2" color="white" align="center"></a-text>
    </a-entity>

    <a-entity position="0 -1 -4">
        <a-text value="Point and pull trigger to answer" align="center" scale="1.5 1.5 1.5" color="white"></a-text>
    </a-entity>
</a-scene>

<script>
    // Attach VR trigger events to quiz options
    const leftHand = document.querySelector('#leftHand');
    const rightHand = document.querySelector('#rightHand');

    function setupControllerSelection(controller) {
        controller.addEventListener('triggerdown', evt => {
            const intersectedEl = evt.detail.intersectedEl;
            if (intersectedEl && intersectedEl.classList.contains('quiz-option')) {
                intersectedEl.click(); // Trigger the quiz option
            }
        });
    }

    setupControllerSelection(leftHand);
    setupControllerSelection(rightHand);
</script>
