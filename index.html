<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>LearnXR VR Workshop</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Assets -->
      <a-assets>
        <img id="city-sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg">
      </a-assets>

      <!-- Camera Rig with Controllers -->
      <a-entity id="rig">
        <a-entity camera position="0 1.6 0" look-controls wasd-controls>
          <a-cursor color="#FFFFFF" fuse="false" raycaster="objects: .clickable; far: 20"></a-cursor>
        </a-entity>

        <!-- Left Controller -->
        <a-entity laser-controls="hand: left"
                  raycaster="objects: .clickable; far: 20"
                  line="color: cyan"
                  controller-click>
        </a-entity>

        <!-- Right Controller -->
        <a-entity laser-controls="hand: right"
                  raycaster="objects: .clickable; far: 20"
                  line="color: magenta"
                  controller-click>
        </a-entity>
      </a-entity>

      <!-- Lights -->
      <a-light type="ambient" color="#BBB" intensity="0.5"></a-light>
      <a-light type="directional" color="#FFF" intensity="0.8" position="-1 2 1"></a-light>

      <!-- Sky -->
      <a-sky src="#city-sky"></a-sky>

      <!-- Concept & Quiz Spheres -->
      <a-sphere class="clickable" id="concept1" position="-3 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-sphere class="clickable" id="concept2" position="-1 1.25 -5" radius="1.25" color="#4CC3D9"></a-sphere>
      <a-sphere class="clickable" id="concept3" position="1 1.25 -5" radius="1.25" color="#FFC65D"></a-sphere>
      <a-sphere class="clickable" id="quiz" position="3 1.25 -5" radius="1.25" color="#8A2BE2"></a-sphere>
      <a-text value="Quiz" position="3 3 -5" align="center" color="white" width="3"></a-text>

      <!-- Panel for Concept/Quiz Content -->
      <a-entity id="panel" visible="false">
        <a-plane id="panelBG" color="#222" width="4" height="3" position="0 1.6 -2"></a-plane>
        <a-text id="panelTitle" value="" color="#FFF" position="-1.8 2 -2" width="3"></a-text>
        <a-text id="panelContent" value="" color="#FFF" position="-1.8 1.6 -2" width="3" wrap-count="40"></a-text>
        <a-box id="nextBtn" class="clickable" color="#4CAF50" depth="0.2" height="0.3" width="0.7" position="1 0.7 -2">
          <a-text value="Next" position="-0.25 0.05 0.15" width="1.5" color="white"></a-text>
        </a-box>
        <a-box id="prevBtn" class="clickable" color="#F44336" depth="0.2" height="0.3" width="0.7" position="-1 0.7 -2">
          <a-text value="Prev" position="-0.25 0.05 0.15" width="1.5" color="white"></a-text>
        </a-box>
      </a-entity>

      <!-- Score -->
      <a-text id="scoreText" value="" position="0 4 -2" color="yellow" align="center" width="6"></a-text>

      <!-- Scripts -->
      <script>
        // ---------------------------
        // Controller trigger click component
        // ---------------------------
        AFRAME.registerComponent('controller-click', {
          init: function () {
            this.el.addEventListener('triggerdown', () => {
              const raycaster = this.el.components.raycaster;
              if (!raycaster) return;
              const intersections = raycaster.intersections;
              if (intersections.length > 0) {
                const target = intersections[0].object.el;
                if (target) target.emit('click');
              }
            });
          }
        });

        // ---------------------------
        // Concept Pages
        // ---------------------------
        const concepts = {
          concept1: [
            "Concept 1: Motion Basics - Page 1",
            "Concept 1: Motion Basics - Page 2",
            "Concept 1: Motion Basics - Page 3"
          ],
          concept2: [
            "Concept 2: Speed & Velocity - Page 1",
            "Concept 2: Speed & Velocity - Page 2",
            "Concept 2: Speed & Velocity - Page 3"
          ],
          concept3: [
            "Concept 3: Centripetal Force - Page 1",
            "Concept 3: Centripetal Force - Page 2",
            "Concept 3: Centripetal Force - Page 3",
            "Concept 3: Centripetal Force - Page 4"
          ]
        };

        const quizQuestions = [
          "Quiz Q1: Explain Concept 1 in your own words.",
          "Quiz Q2: Explain Concept 1 in your own words.",
          "Quiz Q3: Explain Concept 2 in your own words.",
          "Quiz Q4: Explain Concept 2 in your own words.",
          "Quiz Q5: Explain Concept 2 in your own words.",
          "Quiz Q6: Explain Concept 3 in your own words.",
          "Quiz Q7: Explain Concept 3 in your own words.",
          "Quiz Q8: Explain Concept 3 in your own words.",
          "Quiz Q9: Explain Concept 1 in your own words.",
          "Quiz Q10: Explain Concept 2 in your own words.",
          "Quiz Q11: Explain Concept 3 in your own words.",
          "Quiz Q12: Explain all concepts in your own words."
        ];

        let currentConcept = "";
        let pageIndex = 0;
        let quizIndex = 0;

        const panel = document.querySelector('#panel');
        const panelTitle = document.querySelector('#panelTitle');
        const panelContent = document.querySelector('#panelContent');
        const scoreText = document.querySelector('#scoreText');

        const showPanel = (title, content) => {
          panelTitle.setAttribute('value', title);
          panelContent.setAttribute('value', content);
          panel.setAttribute('visible', true);
        };

        // ---------------------------
        // Sphere click logic
        // ---------------------------
        document.querySelectorAll('.clickable').forEach(el => {
          el.addEventListener('click', () => {
            if (el.id.startsWith("concept")) {
              currentConcept = el.id;
              pageIndex = 0;
              showPanel(currentConcept, concepts[currentConcept][pageIndex]);
            } else if (el.id === "quiz") {
              currentConcept = "quiz";
              pageIndex = 0;
              showPanel("Quiz", quizQuestions[quizIndex]);
            }
          });
        });

        // ---------------------------
        // Next & Prev buttons
        // ---------------------------
        document.querySelector('#nextBtn').addEventListener('click', () => {
          if (currentConcept === "quiz") {
            quizIndex++;
            if (quizIndex >= quizQuestions.length) {
              quizIndex = quizQuestions.length - 1;
              scoreText.setAttribute('value', "You finished the quiz!");
            }
            panelContent.setAttribute('value', quizQuestions[quizIndex]);
          } else {
            if (pageIndex < concepts[currentConcept].length - 1) {
              pageIndex++;
              panelContent.setAttribute('value', concepts[currentConcept][pageIndex]);
            }
          }
        });

        document.querySelector('#prevBtn').addEventListener('click', () => {
          if (currentConcept === "quiz") {
            if (quizIndex > 0) {
              quizIndex--;
              panelContent.setAttribute('value', quizQuestions[quizIndex]);
            }
          } else {
            if (pageIndex > 0) {
              pageIndex--;
              panelContent.setAttribute('value', concepts[currentConcept][pageIndex]);
            }
          }
        });

      </script>
    </a-scene>
  </body>
</html>
