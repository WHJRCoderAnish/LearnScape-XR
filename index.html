<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>LearnXR VR — Circular Motion Workshop</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script>
    // --- Concept Pages ---
    const conceptPages = {
      ball: [
        "Motion is the change in position of an object with time.",
        "Circular motion is when an object moves along a circular path.",
        "Examples: Ferris wheel, wheels, planets orbiting the Sun.",
        "In circular motion, speed may be constant but direction changes.",
        "Velocity changes because direction changes; this causes acceleration towards center."
      ],
      pendulum: [
        "Periodic motion repeats at regular intervals.",
        "A pendulum is a weight hung from a fixed point that swings back and forth.",
        "The pendulum moves from one side to another and back in equal time intervals.",
        "Time period = time for one complete swing; frequency = number of swings per second.",
        "Examples: clocks, playground swings, and scientific experiments."
      ],
      ring: [
        "Objects moving in a circle need a force directed towards the center.",
        "This inward force is called centripetal force.",
        "Centripetal acceleration depends on speed and radius: a = v^2/r.",
        "Examples: spinning rides, satellites, turning cars.",
        "Key idea: motion in a circle requires constant change of direction due to inward force."
      ],
      quiz: [
        "1. What is circular motion?",
        "2. Give an example of periodic motion.",
        "3. Why does velocity change in circular motion?",
        "4. Name a real-life example of centripetal force.",
        "5. What is a pendulum?",
        "6. Define time period in pendulum motion.",
        "7. Explain frequency of a pendulum.",
        "8. Give two examples of circular motion in daily life.",
        "9. How is centripetal acceleration calculated?",
        "10. Why is centripetal force necessary?",
        "11. Explain motion when no centripetal force acts.",
        "12. Name applications of centripetal force."
      ]
    };

    // --- Learning Status ---
    const learningStatus = { ball: 0, pendulum: 0, ring: 0, quiz: 0 };

    // --- Click-to-learn Component ---
    AFRAME.registerComponent('click-learn', {
      schema: { concept: { type: 'string' } },
      init: function () {
        this.el.addEventListener('click', () => showConcept(this.data.concept));
      }
    });

    let currentConcept = '';
    function showConcept(concept) {
      currentConcept = concept;
      const panel = document.querySelector('#contentPanel');
      panel.setAttribute('visible', true);
      panel.setAttribute('data-concept', concept);

      // Show first page or last visited page
      learningStatus[concept] = Math.max(learningStatus[concept], 1);
      updateConceptText();
    }

    function updateConceptText() {
      const panel = document.querySelector('#contentPanel');
      const concept = panel.getAttribute('data-concept');
      const page = learningStatus[concept];
      panel.querySelector('a-text').setAttribute('value', conceptPages[concept][page - 1]);
    }

    function nextPage() {
      const panel = document.querySelector('#contentPanel');
      const concept = panel.getAttribute('data-concept');
      if (learningStatus[concept] < conceptPages[concept].length) {
        learningStatus[concept]++;
        updateConceptText();
      }
    }

    function prevPage() {
      const panel = document.querySelector('#contentPanel');
      const concept = panel.getAttribute('data-concept');
      if (learningStatus[concept] > 1) {
        learningStatus[concept]--;
        updateConceptText();
      }
    }

    function closePanel() {
      document.querySelector('#contentPanel').setAttribute('visible', false);
    }

    // --- Floating Animation Component ---
    AFRAME.registerComponent('floaty', {
      schema: { amplitude: { default: 0.2 }, speed: { default: 1 } },
      init: function () {
        this.startY = this.el.object3D.position.y;
        this.time = 0;
      },
      tick: function (t, dt) {
        this.time += dt / 1000;
        this.el.object3D.position.y = this.startY + Math.sin(this.time * this.data.speed) * this.data.amplitude;
      }
    });

    // --- Controller click helper for Meta Quest 3s ---
    AFRAME.registerComponent('controller-listener', {
      init: function () {
        const el = this.el;
        el.addEventListener('triggerdown', () => {
          const intersections = el.components.raycaster.intersections;
          if (intersections.length > 0) {
            const clickedEl = intersections[0].object.el;
            clickedEl.emit('click');
          }
        });
      }
    });

    // --- Panel buttons support for VR controllers ---
    AFRAME.registerComponent('panel-button', {
      schema: { action: { type: 'string' } },
      init: function () {
        this.el.addEventListener('click', () => {
          if (this.data.action === 'prev') prevPage();
          if (this.data.action === 'next') nextPage();
          if (this.data.action === 'close') closePanel();
        });
      }
    });
  </script>
</head>

<body>
  <a-scene>
    <!-- Assets -->
    <a-assets>
      <img id="wood" src="https://cdn.aframe.io/a-painter/images/wood.jpg">
      <img id="floor" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      <img id="city-sky" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/city.jpg">
      <img id="landscape" src="https://raw.githubusercontent.com/alluringxstalwart/SourceYISL/main/Landscape.png">
    </a-assets>

    <!-- Camera + Controls -->
    <a-entity id="rig">
      <a-entity camera position="0 1.6 0" look-controls wasd-controls>
        <a-cursor color="#FFFFFF" fuse="false" raycaster="objects: .clickable; far: 20"></a-cursor>
      </a-entity>

      <!-- Left Controller -->
      <a-entity id="leftController" meta-touch-controls="hand: left" laser-controls="hand: left"
                raycaster="objects: .clickable; far: 20" line="color: cyan" controller-listener>
      </a-entity>

      <!-- Right Controller -->
      <a-entity id="rightController" meta-touch-controls="hand: right" laser-controls="hand: right"
                raycaster="objects: .clickable; far: 20" line="color: magenta" controller-listener>
      </a-entity>
    </a-entity>

    <!-- Lights -->
    <a-light type="ambient" color="#BBB" intensity="0.5"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.8" position="-1 2 1"></a-light>

    <!-- Environment -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" src="#floor"></a-plane>
    <a-sky src="#city-sky"></a-sky>

    <!-- Floating Spheres for Concepts + Quiz -->
    <a-sphere class="clickable" position="-4 1.5 -4" radius="0.5" color="#4CC3D9"
              click-learn="concept: ball" floaty>
      <a-text value="Ball" align="center" color="white" width="1.5" position="0 0.8 0"></a-text>
    </a-sphere>

    <a-sphere class="clickable" position="-1.3 1.5 -4" radius="0.5" color="#EF2D5E"
              click-learn="concept: pendulum" floaty>
      <a-text value="Pendulum" align="center" color="white" width="1.5" position="0 0.8 0"></a-text>
    </a-sphere>

    <a-sphere class="clickable" position="1.3 1.5 -4" radius="0.5" color="#00FFAA"
              click-learn="concept: ring" floaty>
      <a-text value="Centripetal" align="center" color="white" width="1.5" position="0 0.8 0"></a-text>
    </a-sphere>

    <a-sphere class="clickable" position="4 1.5 -4" radius="0.5" color="#FFD700"
              click-learn="concept: quiz" floaty>
      <a-text value="Quiz" align="center" color="black" width="1.5" position="0 0.
